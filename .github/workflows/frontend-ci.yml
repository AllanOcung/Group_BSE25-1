name: Frontend CI

on:
  push:
    branches: [ main, staging-test ]
  pull_request:
    branches: [ main, staging-test ]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run lint (optional)
      - name: Run lint
        run: npm run lint

      # Step 5: Run tests
      - name: Run tests
        run: npm test -- --watchAll=false

      # Step 6: Build frontend (optional, helps catch build errors)
      - name: Build frontend
        run: npm run build
